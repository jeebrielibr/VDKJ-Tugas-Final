# Konfigurasi Nginx reverse proxy untuk VM DMZ (7.7.7.2)
# File: /etc/nginx/sites-available/vdkj-apps

# Upstream definitions
upstream app1_backend {
    server 127.0.0.1:5000;
}

upstream app2_backend {
    server 127.0.0.1:8080;
}

# Default server — tolak request yang tidak match
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# App 1 — Buku Tamu (Flask)
server {
    listen 80;
    server_name app1.vdkj.local;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Access & error log
    access_log /var/log/nginx/app1_access.log;
    error_log  /var/log/nginx/app1_error.log;

    location / {
        proxy_pass http://app1_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# App 2 — Manajemen Produk (PHP)
server {
    listen 80;
    server_name app2.vdkj.local;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Access & error log
    access_log /var/log/nginx/app2_access.log;
    error_log  /var/log/nginx/app2_error.log;

    location / {
        proxy_pass http://app2_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
